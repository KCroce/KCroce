name: Update Profile Tree

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate repo list
        run: |
          echo '```bash' > tree.txt
          echo "." >> tree.txt
          curl -s https://api.github.com/users/KCroce/repos | \
          jq -r '.[].name' | sort | while read repo; do
            echo "├── $repo" >> tree.txt
          done
          echo '```' >> tree.txt

      - name: Inject into README
        run: |
          awk '/<!-- TREE_START -->/{print; system("cat tree.txt"); next} \
               /<!-- TREE_END -->/{print; next} \
               !/<!-- TREE_START -->/,!/<!-- TREE_END -->/' README.md > README.new
          mv README.new README.md

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add README.md
          git commit -m "Update repo tree" || echo "No changes"
          git push
